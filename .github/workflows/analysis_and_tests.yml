name: Run Analysis and Tests

on:
  pull_request:
    branches: [main]

jobs:
  analyzer:
    name: Flutter Analyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Flutter
        uses: ./.actions/flutter-action
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter pub get
      - name: create .env
        run: cp env_template .env
      - name: build generated code
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate localizations
        run: flutter gen-l10n
      - name: Install Widgetbook
        working-directory: widgetbook
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
      - name: Analyze Dart
        uses: ./.actions/github-actions-analyze-dart
      - name: Analyze Flutter
        run: flutter analyze
  unit_tests:
    name: Unit Tests with Coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Flutter
        uses: ./.actions/flutter-action
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter pub get
      - name: create .env
        run: cp env_template .env
      - name: build generated code
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate localizations
        run: flutter gen-l10n
      - name: Install lcov
        run: sudo apt-get install lcov
      - name: Create coverage helper file
        run: |
          file=test/coverage_helper_test.dart
          echo "// Helper file to make coverage work for all dart files\n" > $file
          echo "// ignore_for_file: unused_import" >> $file
          find lib -not -name '*.g.dart' -and -name '*.dart' | cut -c4- | awk -v package=$(cat pubspec.yaml | grep 'name:' | cut -d ':' -f2- | tr -d ' ') '{printf "import '\''package:%s%s'\'';\n", package, $1}' >> $file
          echo "void main(){}" >> $file
      - run: flutter test --coverage
      - name: Filter Coverage Report
        run: |
          lcov --remove coverage/lcov.info 'lib/**/*.g.dart' 'lib/env/env.dart' -o coverage/filtered_lcov.info
      - name: Generate Coverage Report
        run: |
          mkdir -p coverage
          genhtml -o coverage coverage/filtered_lcov.info --quiet
          coverage_percentage=$(grep -Po '(headerCovTableEntryLo|headerCovTableEntryMed).*?>\K[0-9.]+(?=&nbsp;%)' coverage/index.html | head -n 1)
          if [ -z "$coverage_percentage" ]; then
            coverage_percentage="0"
          fi
          echo "$coverage_percentage" > coverage_percentage.txt
      - name: Add Coverage Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coveragePercentage = fs.readFileSync('coverage_percentage.txt', 'utf8').trim();
            const commentBody = `## Code Coverage\n- ${coveragePercentage}%`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: commentBody,
            });